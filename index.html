<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCESS VERSION 3.O</title>
    <style>
        /* --- General Body Styles --- */
        body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; user-select: none; overflow-x: hidden;
        }
        h1 { margin-top: 30px; }

        /* --- Search Bar Styles --- */
        .search-wrapper { position: relative; width: 90%; max-width: 600px; margin-top: 20px; z-index: 1001; }
        #search-input { 
            width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #444; 
            background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; 
        }
        #search-input:focus { border-color: #fff; }
        
        #dropdown { 
            position: absolute; top: 100%; left: 0; width: 100%; background: #222; 
            border: 1px solid #444; border-radius: 0 0 8px 8px; display: none; 
            overflow: hidden; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
        }
        .dropdown-item { padding: 12px; cursor: pointer; color: #fff; border-bottom: 1px solid #333; display: flex; align-items: center; }
        .dropdown-item:hover { background: #444; }
        
        /* --- Navigation Grid Styles --- */
        .container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px; width: 90%; max-width: 1000px; margin-top: 30px;
        }
        .card {
            background: #1a1a1a; padding: 30px 20px; text-align: center; border-radius: 12px;
            text-decoration: none; color: #fff; border: 2px solid #333;
            transition: 0.2s; cursor: pointer; font-weight: bold; display: block; font-size: 16px;
        }
        .card:focus, .card:hover { background: #fff; color: #000; border-color: #fff; transform: scale(1.05); }

        /* --- New Control Buttons --- */
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .control-btn {
            padding: 10px 20px; background: #333; color: #fff; border: 1px solid #444;
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .control-btn:hover { background: #555; }

        /* --- Web Frame Styles --- */
        #frame-container {
            width: 90%; max-width: 1000px; height: 600px; margin-top: 20px;
            margin-bottom: 50px; border: 2px solid #444; border-radius: 10px; overflow: hidden; background: #111;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Dashboard</h1>

    <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="Search the web or type a website..." autocomplete="off">
        <div id="dropdown"></div>
    </div>

    <div class="container">
        <a href="https://www.google.com/webhp?igu=1" target="content-frame" class="card">Google</a>
        <a href="https://www.wikipedia.org" target="content-frame" class="card">Wikipedia</a>
        <a href="https://www.youtube.com" target="_blank" class="card">YouTube</a>
        <a href="https://www.github.com" target="_blank" class="card">GitHub</a>
        <a href="https://saisandeep647.github.io/access/adsblock" target="_blank" class="card">access</a>
        <a href="https://saisandeep647.github.io/access/access" target="_blank" class="card">accessv2</a>
         <a href="https://gofile.io/d/jTOG9m" target="_blank" class="card">pritam and pedro part 1</a>
        <a href="https://gofile.io/d/OwuUvX" target="_blank" class="card">pritam and pedro part 2</a>
        <button class="card" id="adblock-btn" onclick="toggleAdBlock()">Ad-Blocker: OFF</button>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="toggleFullScreen()">Full Screen</button>
        <button class="control-btn" onclick="exitFullScreen()">Exit Full Screen</button>
        <button class="control-btn" onclick="reloadFrame()">Reload Frame</button>
    </div>

    <div id="frame-container">
        <!-- Added loading="lazy" for better performance on low-end devices -->
        <iframe name="content-frame" src="about:blank" loading="lazy" title="Web Frame"></iframe>
    </div>

    <script>
        // 1. Existing Security Logic
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85) || (e.ctrlKey && e.keyCode == 83)) {
                e.preventDefault(); return false;
            }
        });

        const sites = [
            { name: "Google", url: "https://www.google.com/webhp?igu=1" },
            { name: "Wikipedia", url: "https://www.wikipedia.org" },
            { name: "YouTube", url: "https://www.youtube.com" },
            { name: "GitHub", url: "https://www.github.com" }
        ];

        const input = document.getElementById('search-input');
        const contentFrame = document.querySelector('iframe[name="content-frame"]');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (query) {
                    // Net27.cc logic
                    if (query.toLowerCase() === 'net27.cc') {
                        contentFrame.src = "https://net27.cc/";
                    } else {
                        const exactMatch = sites.find(s => s.name.toLowerCase() === query.toLowerCase());
                        if (exactMatch && exactMatch.name !== 'YouTube' && exactMatch.name !== 'GitHub') {
                            contentFrame.src = exactMatch.url;
                        } else {
                            contentFrame.src = `https://www.google.com/search?q=${encodeURIComponent(query)}&igu=1`;
                        }
                    }
                    input.value = '';
                }
            }
        });

        // 2. New Control Functions
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        }
        function exitFullScreen() {
            if (document.fullscreenElement) document.exitFullscreen();
        }
        function reloadFrame() {
            contentFrame.src = contentFrame.src;
        }

        function toggleAdBlock() {
            let btn = document.getElementById('adblock-btn');
            btn.textContent = btn.textContent.includes("OFF") ? "Ad-Blocker: ON" : "Ad-Blocker: OFF";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
        }

        .card {
            background: #1a1a1a;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            color: #fff;
            border: 2px solid #333;
            transition: 0.2s;
            cursor: pointer;
            font-weight: bold;
            display: block;
            text-decoration: none;
        }

        .card:focus, .card:hover {
            background: #fff;
            color: #000;
            outline: none;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Dashboard</h1>

    <div class="container">
        <button class="card" onclick="goTo('https://www.google.com/webhp?igu=1')">Google</button>
        <button class="card" onclick="goTo('https://www.wikipedia.org')">Wikipedia</button>
        <button class="card" onclick="goTo('https://www.youtube.com')">YouTube</button>
        <button class="card" onclick="goTo('https://www.github.com')">GitHub</button>
        <button class="card" onclick="alert('Ad-Blocker Active')">Ad-Block Info</button>
    </div>

    <script>
        // Use replace to prevent the dashboard from staying in the browser history
        function goTo(url) {
            window.location.replace(url);
        }

        // TV Remote Navigation
        let cards = document.querySelectorAll('.card');
        let index = 0;
        
        // Focus the first item on load
        cards[0].focus();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && index < cards.length - 1) index++;
            if (e.key === 'ArrowLeft' && index > 0) index--;
            
            if (e.key === 'Enter') {
                cards[index].click();
            }
            
            cards[index].focus();
        });
    </script>
</body>
</html>

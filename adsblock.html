<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none; /* Prevents text selection */
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
        }

        .card {
            background: #1a1a1a;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            border: 2px solid #333;
            transition: 0.2s;
            cursor: pointer;
            font-weight: bold;
        }

        .card:focus, .card:hover {
            background: #fff;
            color: #000;
            outline: none;
            transform: scale(1.05);
        }

        /* Video Player Section */
        #video-section {
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
        }
        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <h1>Dashboard</h1>

    <div class="container">
        <a href="https://www.google.com" class="card">Google</a>
        <a href="https://www.wikipedia.org" class="card">Wikipedia</a>
        <a href="https://www.youtube.com" class="card">YouTube</a>
        <a href="https://www.github.com" class="card">GitHub</a>
        <button class="card" onclick="alert('Ad-Blocker Active')">Ad-Block Info</button>
    </div>

    <div id="video-section">
        <video controls preload="metadata">
            <source src="your-video-file.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        // Disable common keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) || (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0))) {
                e.preventDefault();
                return false;
            }
        });

        // TV Remote Navigation (Arrow Keys)
        let cards = document.querySelectorAll('.card');
        let index = 0;
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && index < cards.length - 1) index++;
            if (e.key === 'ArrowLeft' && index > 0) index--;
            if (e.key === 'Enter') cards[index].click();
            cards[index].focus();
        });
    </script>
</body>
</html>
